<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head(${product.name})}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-5">
    <div class="row">
        <div class="col-md-5">
            <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/500x400?text=Product'}" class="img-fluid rounded" alt="product image">
        </div>
        <div class="col-md-7">
            <h2 th:text="${product.name}">Product Name</h2>
            <p class="text-muted" th:text="${product.category != null ? product.category.name : ''}"></p>
            <h4 class="text-primary" th:text="'₹' + ${product.price}">₹0</h4>
            <p th:text="${product.description}">Description here.</p>
            <p>Stock available: <span th:text="${product.stock}">0</span></p>

            <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="row g-2" sec:authorize="hasAnyRole('USER','ADMIN')" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                <div class="col-auto">
                    <input type="number" name="quantity" value="1" min="1" th:max="${product.stock}" class="form-control" style="width:100px">
                </div>
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary" th:disabled="${product.stock == 0}">Add to Cart</button>
                </div>
            </form>
            <p sec:authorize="!isAuthenticated()" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                <a th:href="@{/login}">Login</a> to add this item to your cart.
            </p>
        </div>
    </div>
</div>
</body>
</html>
