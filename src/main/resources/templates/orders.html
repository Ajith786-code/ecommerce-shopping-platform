<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('My Orders')}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-5">
    <h2 class="mb-4">My Orders</h2>
    <div th:if="${#lists.isEmpty(orders)}" class="alert alert-info">You haven't placed any orders yet.</div>

    <table class="table" th:if="${!#lists.isEmpty(orders)}">
        <thead><tr><th>Order #</th><th>Date</th><th>Status</th><th>Total</th><th></th></tr></thead>
        <tbody>
        <tr th:each="order : ${orders}">
            <td th:text="${order.id}"></td>
            <td th:text="${#temporals.format(order.orderDate, 'dd-MM-yyyy HH:mm')}"></td>
            <td><span class="badge bg-secondary" th:text="${order.status}"></span></td>
            <td th:text="'₹' + ${order.totalAmount}"></td>
            <td><a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">View</a></td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
