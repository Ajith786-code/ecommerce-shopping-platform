<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Manage Products')}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>Manage Products</h2>
        <a class="btn btn-primary" th:href="@{/admin/products/new}">+ Add Product</a>
    </div>

    <table class="table">
        <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th></th></tr></thead>
        <tbody>
        <tr th:each="product : ${productPage.content}">
            <td th:text="${product.name}"></td>
            <td th:text="${product.category != null ? product.category.name : '-'}"></td>
            <td th:text="'₹' + ${product.price}"></td>
            <td th:text="${product.stock}"></td>
            <td>
                <a class="btn btn-sm btn-outline-secondary" th:href="@{/admin/products/edit/{id}(id=${product.id})}">Edit</a>
                <form th:action="@{/admin/products/delete/{id}(id=${product.id})}" method="post" class="d-inline">
                    <button type="submit" class="btn btn-sm btn-danger" onclick="return confirm('Delete this product?');">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
