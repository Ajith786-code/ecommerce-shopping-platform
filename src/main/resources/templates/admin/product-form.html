<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Product Form')}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-5" style="max-width: 600px;">
    <h2 class="mb-4" th:text="${product.id != null ? 'Edit Product' : 'Add Product'}">Product Form</h2>

    <form th:action="@{/admin/products/save}" th:object="${product}" method="post">
        <input type="hidden" th:field="*{id}">
        <div class="mb-3">
            <label class="form-label">Name</label>
            <input type="text" th:field="*{name}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Description</label>
            <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
        </div>
        <div class="mb-3">
            <label class="form-label">Price (₹)</label>
            <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Stock</label>
            <input type="number" th:field="*{stock}" class="form-control" required>
        </div>
        <div class="mb-3">
            <label class="form-label">Image URL</label>
            <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://...">
        </div>
        <div class="mb-3">
            <label class="form-label">Category</label>
            <select th:field="*{category}" class="form-select">
                <option th:each="c : ${categories}" th:value="${c.id}" th:text="${c.name}"></option>
            </select>
        </div>
        <button type="submit" class="btn btn-primary w-100">Save Product</button>
    </form>
</div>
</body>
</html>
