<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Your Cart')}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-5">
    <h2 class="mb-4">Your Cart</h2>

    <div th:if="${#lists.isEmpty(cartItems)}" class="alert alert-info">
        Your cart is empty. <a th:href="@{/products}">Browse products</a>
    </div>

    <table class="table" th:if="${!#lists.isEmpty(cartItems)}">
        <thead>
        <tr><th>Product</th><th>Price</th><th>Quantity</th><th>Subtotal</th><th></th></tr>
        </thead>
        <tbody>
        <tr th:each="item : ${cartItems}">
            <td th:text="${item.product.name}">Product</td>
            <td th:text="'₹' + ${item.product.price}">₹0</td>
            <td>
                <form th:action="@{/cart/update/{id}(id=${item.id})}" method="post" class="d-flex">
                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="form-control form-control-sm" style="width:80px">
                    <button type="submit" class="btn btn-sm btn-outline-secondary ms-2">Update</button>
                </form>
            </td>
            <td th:text="'₹' + ${item.product.price * item.quantity}">₹0</td>
            <td>
                <form th:action="@{/cart/remove/{id}(id=${item.id})}" method="post">
                    <button type="submit" class="btn btn-sm btn-danger">Remove</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>

    <div th:if="${!#lists.isEmpty(cartItems)}" class="text-end">
        <h4>Total: <span th:text="'₹' + ${total}">₹0</span></h4>
        <a class="btn btn-success btn-lg" th:href="@{/checkout}">Proceed to Checkout</a>
    </div>
</div>
</body>
</html>
