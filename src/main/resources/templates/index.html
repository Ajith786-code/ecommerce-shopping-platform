<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Home')}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-5">
    <div class="p-5 mb-4 bg-primary text-white rounded-3">
        <h1 class="display-5 fw-bold">Welcome to ShopEase</h1>
        <p class="col-md-8 fs-4">Your one-stop online shopping platform. Great products, great prices.</p>
        <a class="btn btn-light btn-lg" th:href="@{/products}">Shop Now</a>
    </div>

    <h3 class="mb-3">Featured Products</h3>
    <div class="row row-cols-1 row-cols-md-4 g-4">
        <div class="col" th:each="product : ${featuredProducts}">
            <div class="card h-100">
                <img th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300x180?text=Product'}" class="card-img-top" alt="product image">
                <div class="card-body">
                    <h5 class="card-title" th:text="${product.name}">Product</h5>
                    <p class="card-text fw-bold" th:text="'₹' + ${product.price}">₹0</p>
                    <a class="btn btn-outline-primary btn-sm" th:href="@{/products/{id}(id=${product.id})}">View</a>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="footer">&copy; 2026 ShopEase | Data Alcott Systems Internship Task JV-EC-001</div>
</body>
</html>
