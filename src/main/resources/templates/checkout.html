<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Checkout')}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-5" style="max-width: 600px;">
    <h2 class="mb-4">Checkout</h2>
    <div class="alert alert-danger" th:if="${error}" th:text="${error}"></div>

    <ul class="list-group mb-3">
        <li class="list-group-item d-flex justify-content-between" th:each="item : ${cartItems}">
            <span th:text="${item.product.name} + ' x ' + ${item.quantity}"></span>
            <span th:text="'₹' + ${item.product.price * item.quantity}"></span>
        </li>
        <li class="list-group-item d-flex justify-content-between fw-bold">
            <span>Total</span>
            <span th:text="'₹' + ${total}"></span>
        </li>
    </ul>

    <form th:action="@{/checkout}" method="post">
        <div class="mb-3">
            <label class="form-label">Shipping Address</label>
            <textarea name="shippingAddress" class="form-control" rows="3" required></textarea>
        </div>
        <div class="alert alert-secondary small">
            Payment: Simulated Razorpay/Stripe checkout — order will be placed directly (no real payment gateway wired up).
        </div>
        <button type="submit" class="btn btn-success w-100">Place Order</button>
    </form>
</div>
</body>
</html>
