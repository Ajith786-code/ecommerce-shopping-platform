<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/header :: head('Order Detail')}"></head>
<body>
<div th:replace="~{fragments/header :: navbar}"></div>

<div class="container my-5">
    <h2 class="mb-3">Order #<span th:text="${order.id}"></span></h2>
    <p>Status: <span class="badge bg-secondary" th:text="${order.status}"></span></p>
    <p>Shipping Address: <span th:text="${order.shippingAddress}"></span></p>

    <table class="table">
        <thead><tr><th>Product</th><th>Qty</th><th>Price</th><th>Subtotal</th></tr></thead>
        <tbody>
        <tr th:each="item : ${order.orderItems}">
            <td th:text="${item.product.name}"></td>
            <td th:text="${item.quantity}"></td>
            <td th:text="'₹' + ${item.price}"></td>
            <td th:text="'₹' + ${item.price * item.quantity}"></td>
        </tr>
        </tbody>
    </table>
    <h4 class="text-end">Total: <span th:text="'₹' + ${order.totalAmount}"></span></h4>
</div>
</body>
</html>
